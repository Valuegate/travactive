<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 800" width="400" height="800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Rajdhani:wght@600;700&amp;display=swap');

      .plane-group { animation: planeFly1 3.5s linear infinite; }
      @keyframes planeFly1 {
        0%   { transform: translate(-120px, 680px) rotate(-22deg); opacity: 0; }
        12%  { opacity: 1; }
        88%  { opacity: 1; }
        100% { transform: translate(480px, -100px) rotate(-22deg); opacity: 0; }
      }

      .stripe1 { animation: stripe 2.2s linear infinite 0s; }
      .stripe2 { animation: stripe 2.2s linear infinite 0.73s; }
      .stripe3 { animation: stripe 2.2s linear infinite 1.46s; }
      @keyframes stripe {
        0%   { transform: translateY(-4px); opacity: 1; }
        100% { transform: translateY(804px); opacity: 0.2; }
      }

      .glow-pulse { animation: glowPulse 3s ease-in-out infinite; }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      .cta-blink { animation: ctaBlink 2s ease-in-out infinite; }
      @keyframes ctaBlink {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }

      .trav-text {
        font-family: 'Bebas Neue', 'Arial Black', sans-serif;
        font-size: 96px;
        font-weight: 400;
        fill: #00ff00;
        letter-spacing: 8px;
      }
      .active-text {
        font-family: 'Bebas Neue', 'Arial Black', sans-serif;
        font-size: 58px;
        font-weight: 400;
        fill: #ffffff;
        letter-spacing: 18px;
      }
      .tag-text {
        font-family: 'Rajdhani', 'Arial', sans-serif;
        font-size: 18px;
        font-weight: 700;
        fill: #00ff00;
        letter-spacing: 4px;
      }
      .sub-text {
        font-family: 'Rajdhani', 'Arial', sans-serif;
        font-size: 13px;
        font-weight: 600;
        fill: rgba(255,255,255,0.45);
        letter-spacing: 3px;
      }
      .cta-text {
        font-family: 'Bebas Neue', 'Arial Black', sans-serif;
        font-size: 24px;
        font-weight: 400;
        fill: #001a00;
        letter-spacing: 5px;
      }
      .label-text {
        font-family: 'Rajdhani', 'Arial', sans-serif;
        font-size: 11px;
        font-weight: 600;
        fill: rgba(255,255,255,0.35);
        letter-spacing: 2px;
      }
    </style>

    <!-- Grid pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(0,200,0,0.07)" stroke-width="0.5"/>
    </pattern>

    <!-- Glow filter -->
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip to banner -->
    <clipPath id="bannerClip1">
      <rect width="400" height="800"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="800" fill="#071a07"/>

  <!-- Grid texture -->
  <rect width="400" height="800" fill="url(#grid)"/>

  <!-- Border -->
  <rect width="400" height="800" fill="none" stroke="#1a5c1a" stroke-width="3"/>

  <!-- Horizontal scan stripes -->
  <g clip-path="url(#bannerClip1)">
    <rect class="stripe1" x="0" y="0" width="400" height="3" fill="#00c800" opacity="0.6"/>
    <rect class="stripe2" x="0" y="0" width="400" height="2" fill="#00c800" opacity="0.4"/>
    <rect class="stripe3" x="0" y="0" width="400" height="2" fill="#00c800" opacity="0.3"/>
  </g>

  <!-- Bottom glow radial -->
  <ellipse class="glow-pulse" cx="200" cy="760" rx="260" ry="160" fill="rgba(0,160,0,0.18)"/>
  <ellipse class="glow-pulse" cx="200" cy="760" rx="140" ry="90" fill="rgba(0,200,0,0.12)"/>

  <!-- Top left corner accent -->
  <line x1="3" y1="3" x2="50" y2="3" stroke="#00c800" stroke-width="2"/>
  <line x1="3" y1="3" x2="3" y2="50" stroke="#00c800" stroke-width="2"/>
  <!-- Top right corner accent -->
  <line x1="397" y1="3" x2="350" y2="3" stroke="#00c800" stroke-width="2"/>
  <line x1="397" y1="3" x2="397" y2="50" stroke="#00c800" stroke-width="2"/>
  <!-- Bottom left corner accent -->
  <line x1="3" y1="797" x2="50" y2="797" stroke="#00c800" stroke-width="2"/>
  <line x1="3" y1="797" x2="3" y2="750" stroke="#00c800" stroke-width="2"/>
  <!-- Bottom right corner accent -->
  <line x1="397" y1="797" x2="350" y2="797" stroke="#00c800" stroke-width="2"/>
  <line x1="397" y1="797" x2="397" y2="750" stroke="#00c800" stroke-width="2"/>

  <!-- LOGO -->
  <text class="trav-text" x="200" y="130" text-anchor="middle" filter="url(#textGlow)">TRAV</text>
  <text class="active-text" x="200" y="196" text-anchor="middle">ACTIVE</text>

  <!-- Divider line -->
  <line x1="40" y1="220" x2="360" y2="220" stroke="#00c800" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="220" r="3" fill="#00c800"/>

  <!-- Small label -->
  <text class="label-text" x="200" y="246" text-anchor="middle">TRAVEL EXPERIENCES</text>

  <!-- Animated Plane Group -->
  <g clip-path="url(#bannerClip1)">
    <g class="plane-group">
      <!-- Trail -->
      <line x1="-10" y1="18" x2="-130" y2="18" stroke="#00ff00" stroke-width="2" opacity="0.5" stroke-dasharray="6 5"/>
      <line x1="-10" y1="18" x2="-80" y2="18" stroke="#00ff00" stroke-width="3" opacity="0.3"/>
      <!-- Fuselage -->
      <path d="M0 18 L80 10 L100 18 L80 24 Z" fill="#00ff00" opacity="0.95"/>
      <!-- Wings -->
      <path d="M50 10 L72 0 L76 10 Z" fill="#00cc00"/>
      <path d="M50 24 L72 36 L76 24 Z" fill="#00cc00"/>
      <!-- Tail fins -->
      <path d="M16 16 L26 8 L28 16 Z" fill="#009900"/>
      <path d="M16 20 L26 28 L28 20 Z" fill="#009900"/>
      <!-- Cockpit window -->
      <ellipse cx="82" cy="17" rx="7" ry="4" fill="rgba(150,255,150,0.5)"/>
      <!-- Engine pods -->
      <rect x="44" y="8" width="14" height="4" rx="2" fill="#007700"/>
      <rect x="44" y="22" width="14" height="4" rx="2" fill="#007700"/>
    </g>
  </g>

  <!-- Center content block -->
  <rect x="40" y="330" width="320" height="1" fill="rgba(0,200,0,0.3)"/>

  <!-- World illustration: simplified globe lines -->
  <g opacity="0.12" transform="translate(200,450)">
    <ellipse cx="0" cy="0" rx="90" ry="90" fill="none" stroke="#00ff00" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="90" ry="35" fill="none" stroke="#00ff00" stroke-width="0.8"/>
    <line x1="-90" y1="0" x2="90" y2="0" stroke="#00ff00" stroke-width="0.8"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke="#00ff00" stroke-width="0.8"/>
    <ellipse cx="0" cy="0" rx="55" ry="90" fill="none" stroke="#00ff00" stroke-width="0.8"/>
  </g>

  <!-- Tagline -->
  <text class="tag-text" x="200" y="570" text-anchor="middle">FLY BEYOND LIMITS</text>
  <text class="sub-text" x="200" y="596" text-anchor="middle">YOUR JOURNEY STARTS HERE</text>

  <!-- Horizontal rule -->
  <line x1="80" y1="615" x2="320" y2="615" stroke="#00c800" stroke-width="0.5" opacity="0.4"/>

  <!-- Stats row -->
  <text x="100" y="648" text-anchor="middle" font-family="'Bebas Neue','Arial Black',sans-serif" font-size="32" fill="#00ff00">150+</text>
  <text x="100" y="668" text-anchor="middle" font-family="'Rajdhani','Arial',sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.4)" letter-spacing="2">DESTINATIONS</text>

  <line x1="200" y1="630" x2="200" y2="670" stroke="rgba(0,200,0,0.3)" stroke-width="0.5"/>

  <text x="300" y="648" text-anchor="middle" font-family="'Bebas Neue','Arial Black',sans-serif" font-size="32" fill="#00ff00">24/7</text>
  <text x="300" y="668" text-anchor="middle" font-family="'Rajdhani','Arial',sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.4)" letter-spacing="2">SUPPORT</text>

  <!-- CTA Button - hexagonal clip via polygon -->
  <polygon class="cta-blink" points="80,710 320,710 340,730 320,752 80,752 60,730" fill="#00c800"/>
  <polygon points="81,711 319,711 338,730 319,751 81,751 62,730" fill="none" stroke="rgba(0,255,0,0.4)" stroke-width="1"/>
  <text class="cta-text" x="200" y="736" text-anchor="middle">BOOK NOW</text>

  <!-- Bottom label -->
  <text x="200" y="778" text-anchor="middle" font-family="'Rajdhani','Arial',sans-serif" font-size="10" font-weight="600" fill="rgba(0,200,0,0.4)" letter-spacing="3">TRAVACTIVE.COM</text>
</svg>
