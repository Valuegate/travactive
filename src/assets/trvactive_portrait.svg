<svg width="400" height="700" viewBox="0 0 400 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#035a5c"/>
      <stop offset="100%" stop-color="#023436"/>
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e8b8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e8b8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes fly {
        0%   { transform: translateY(0px) rotate(-2deg); }
        50%  { transform: translateY(-14px) rotate(2deg); }
        100% { transform: translateY(0px) rotate(-2deg); }
      }
      @keyframes pulse1 {
        0%   { r: 70; opacity: 0.85; }
        100% { r: 160; opacity: 0; }
      }
      @keyframes pulse2 {
        0%   { r: 70; opacity: 0.6; }
        100% { r: 160; opacity: 0; }
      }
      @keyframes twinkle {
        0%, 100% { opacity: 0.15; }
        50%       { opacity: 1; }
      }
      @keyframes captionPulse {
        0%   { opacity: 0.82; }
        100% { opacity: 1; }
      }
      @keyframes trailFade {
        0%, 100% { opacity: 0.2; }
        50%       { opacity: 0.7; }
      }
      .plane-group { animation: fly 2.6s ease-in-out infinite; transform-origin: 200px 310px; }
      .ring1 { animation: pulse1 2s ease-out infinite; }
      .ring2 { animation: pulse2 2s ease-out 0.7s infinite; }
      .caption-text { animation: captionPulse 1.8s ease-in-out infinite alternate; }
      .trail-line { animation: trailFade 2.6s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="700" fill="url(#bgGlow)"/>

  <!-- Stars -->
  <circle cx="34" cy="55" r="1.2" fill="white" opacity="0.7" style="animation: twinkle 1.8s 0.2s infinite"/>
  <circle cx="78" cy="120" r="0.9" fill="white" opacity="0.5" style="animation: twinkle 2.1s 0.5s infinite"/>
  <circle cx="150" cy="40" r="1.4" fill="white" opacity="0.8" style="animation: twinkle 1.5s 0.1s infinite"/>
  <circle cx="210" cy="80" r="0.8" fill="white" opacity="0.4" style="animation: twinkle 2.4s 0.9s infinite"/>
  <circle cx="310" cy="60" r="1.1" fill="white" opacity="0.6" style="animation: twinkle 1.9s 0.3s infinite"/>
  <circle cx="370" cy="130" r="1.3" fill="white" opacity="0.7" style="animation: twinkle 2.2s 0.7s infinite"/>
  <circle cx="55" cy="200" r="0.9" fill="white" opacity="0.5" style="animation: twinkle 1.6s 1.1s infinite"/>
  <circle cx="340" cy="210" r="1.0" fill="white" opacity="0.6" style="animation: twinkle 2.0s 0.4s infinite"/>
  <circle cx="90" cy="320" r="0.8" fill="white" opacity="0.4" style="animation: twinkle 1.7s 0.8s infinite"/>
  <circle cx="360" cy="350" r="1.2" fill="white" opacity="0.7" style="animation: twinkle 2.3s 0.2s infinite"/>
  <circle cx="25" cy="420" r="1.0" fill="white" opacity="0.5" style="animation: twinkle 1.5s 1.3s infinite"/>
  <circle cx="390" cy="480" r="0.9" fill="white" opacity="0.6" style="animation: twinkle 2.0s 0.6s infinite"/>
  <circle cx="130" cy="560" r="1.1" fill="white" opacity="0.4" style="animation: twinkle 1.8s 1.0s infinite"/>
  <circle cx="280" cy="600" r="0.8" fill="white" opacity="0.5" style="animation: twinkle 2.2s 0.3s infinite"/>
  <circle cx="60" cy="640" r="1.3" fill="white" opacity="0.7" style="animation: twinkle 1.6s 0.9s infinite"/>
  <circle cx="330" cy="660" r="1.0" fill="white" opacity="0.6" style="animation: twinkle 2.1s 0.5s infinite"/>
  <circle cx="190" cy="150" r="0.7" fill="white" opacity="0.4" style="animation: twinkle 1.9s 1.4s infinite"/>
  <circle cx="250" cy="500" r="1.2" fill="white" opacity="0.6" style="animation: twinkle 2.4s 0.8s infinite"/>

  <!-- Top label -->
  <text x="200" y="90" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="700" fill="#4de8c2" opacity="0.65" letter-spacing="5">✦ NEXT STOP EVERYWHERE ✦</text>

  <!-- Pulse rings -->
  <circle class="ring1" cx="200" cy="310" r="70" fill="none" stroke="#00e8b8" stroke-width="1.5"/>
  <circle class="ring2" cx="200" cy="310" r="70" fill="none" stroke="#00e8b855" stroke-width="1"/>
  <!-- Soft glow behind plane -->
  <circle cx="200" cy="310" r="90" fill="url(#ringGlow)"/>

  <!-- Plane group -->
  <g class="plane-group" filter="url(#glow)">
    <!-- Body -->
    <ellipse cx="200" cy="312" rx="80" ry="21" fill="#00e8b8"/>
    <!-- Nose -->
    <path d="M280 312 Q308 312 303 307 L280 305 Z" fill="#00c9a0"/>
    <!-- Tail fin -->
    <path d="M122 312 Q108 294 124 291 L146 306 Z" fill="#00c9a0"/>
    <!-- Top wing -->
    <path d="M178 306 Q200 272 232 282 L228 304 Z" fill="#00ffd0" opacity="0.9"/>
    <!-- Bottom wing -->
    <path d="M178 318 Q200 350 232 338 L228 320 Z" fill="#00ffd0" opacity="0.9"/>
    <!-- Windows -->
    <ellipse cx="232" cy="307" rx="7" ry="6" fill="#023436" opacity="0.65"/>
    <ellipse cx="248" cy="307" rx="7" ry="6" fill="#023436" opacity="0.65"/>
    <ellipse cx="264" cy="308" rx="6" ry="5.5" fill="#023436" opacity="0.65"/>
    <!-- Engine -->
    <ellipse cx="212" cy="330" rx="13" ry="7" fill="#00b89c"/>
    <ellipse cx="212" cy="330" rx="7" ry="4" fill="#023436" opacity="0.5"/>
    <!-- Exhaust glow -->
    <ellipse cx="119" cy="312" rx="9" ry="4" fill="#00e8b8" opacity="0.3"/>
  </g>

  <!-- Caption -->
  <text class="caption-text" x="200" y="430" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="46" font-weight="900"
    fill="#00e8b8" letter-spacing="6" filter="url(#textGlow)">TRVACTIVE</text>

  <!-- Divider -->
  <line class="trail-line" x1="120" y1="455" x2="280" y2="455" stroke="#00e8b8" stroke-width="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="200" y="484" text-anchor="middle" font-family="'Courier New', monospace"
    font-size="11" font-weight="700" fill="#4de8c2" opacity="0.7" letter-spacing="4">TRAVEL · ACTIVE · EXPLORE</text>

  <!-- Bottom badge -->
  <rect x="130" y="510" width="140" height="28" rx="14" fill="none" stroke="#00e8b8" stroke-width="0.8" opacity="0.4"/>
  <text x="200" y="529" text-anchor="middle" font-family="'Courier New', monospace"
    font-size="9" font-weight="700" fill="#00e8b8" opacity="0.55" letter-spacing="3">YOUR WORLD. YOUR PACE.</text>
</svg>
